name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked

      - name: Package
        shell: bash
        run: |
          name="mdnsd-${{ matrix.target }}"
          ext="${{ matrix.ext }}"
          mkdir -p release/${name}
          cp target/release/mdnsd${ext} release/${name}/mdnsd${ext}
          cp config.toml release/${name}/

          printf '[Unit]\nDescription=mDNS/DNS Server\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nExecStart=/usr/local/bin/mdnsd -c /etc/mdnsd/config.toml\nRestart=always\n\n[Install]\nWantedBy=multi-user.target\n' > release/${name}/mdnsd.service

          printf '# mdnsd\n\n## Installation\n\nLinux (systemd):\nsudo cp mdnsd /usr/local/bin/\nsudo cp config.toml /etc/mdnsd/config.toml\nsudo cp mdnsd.service /etc/systemd/system/\nsudo systemctl enable mdnsd\nsudo systemctl start mdnsd\n\nmacOS:\nsudo cp mdnsd /usr/local/bin/\nsudo cp config.toml /etc/mdnsd/config.toml\n\n## Testing\ndig @127.0.0.1 -p 53 your-record.local\n' > release/${name}/README.md

          cd release
          tar -czvf ${name}.tar.gz ${name}/

      - uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.target }}
          path: release/mdnsd-${{ matrix.target }}.tar.gz

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Create Release
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          files=$(find artifacts -type f)
          gh release create "$tag" \
            --title "mdnsd ${tag}" \
            --notes "mdnsd ${tag}" \
            $files

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}