name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked

      - name: Package
        shell: bash
        run: |
          name="mdnsd-${{ matrix.target }}"
          ext="${{ matrix.ext }}"
          mkdir -p release/${name}
          cp target/release/mdnsd${ext} release/${name}/mdnsd${ext}
          cp config.toml release/${name}/

          printf '[Unit]\nDescription=mDNS/DNS Server\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nExecStart=/usr/local/bin/mdnsd -c /etc/mdnsd/config.toml\nRestart=always\n\n[Install]\nWantedBy=multi-user.target\n' > release/${name}/mdnsd.service

          cp release-readme.md release/${name}/README.md

          cd release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            powershell -Command "Compress-Archive -Path '${name}' -DestinationPath '${name}.zip'"
          else
            tar -czvf ${name}.tar.gz ${name}/
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.target }}
          path: release/mdnsd-${{ matrix.target }}.${{ matrix.archive }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create Release
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          files=$(find artifacts -type f)
          gh release create "$tag" \
            --title "mdnsd ${tag}" \
            --notes "mdnsd ${tag}" \
            $files

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}