name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked

      - name: Package
        shell: bash
        run: |
          name="mdnsd-${{ matrix.target }}"
          ext="${{ matrix.ext }}"
          mkdir -p release/${name}
          cp target/release/mdnsd${ext} release/${name}/mdnsd${ext}
          cp config.toml release/${name}/
          
          # Systemd service
          cat > release/${name}/mdnsd.service << 'EOF'
[Unit]
Description=mDNS/DNS Server
After=network.target

[Service]
Type=simple
User=root
ExecStart=/usr/local/bin/mdnsd -c /etc/mdnsd/config.toml
Restart=always

[Install]
WantedBy=multi-user.target
EOF
          
          # README
          cat > release/${name}/README.md << 'EOF'
# mdnsd

## Installation

### Linux (systemd)
```bash
sudo cp mdnsd /usr/local/bin/
sudo cp config.toml /etc/mdnsd/config.toml
sudo cp mdnsd.service /etc/systemd/system/
sudo systemctl enable mdnsd
sudo systemctl start mdnsd
```

### macOS
```bash
sudo cp mdnsd /usr/local/bin/
sudo cp config.toml /etc/mdnsd/config.toml
# Use launchd or homebrew service
```

## Configuration
Edit `config.toml` to add DNS records.

## Testing
```bash
dig @127.0.0.1 -p 53 your-record.local
```
EOF
          
          # Archive
          cd release
          tar -czvf ${name}.tar.gz ${name}/

      - uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.target }}
          path: release/mdnsd-${{ matrix.target }}.tar.gz

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Create Release
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          files=$(find artifacts -type f)
          gh release create "$tag" \
            --title "mdnsd ${tag}" \
            --notes "mdnsd ${tag}" \
            $files

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}