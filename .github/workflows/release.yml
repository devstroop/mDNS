name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked

      - name: Package
        shell: bash
        run: |
          name="mdnsd-${{ matrix.target }}"
          ext="${{ matrix.ext }}"
          mkdir -p release
          cp target/release/mdnsd${ext} release/${name}${ext}

      - uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.target }}
          path: release/

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Create Release
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          cd artifacts
          gh release create "$tag" \
            --title "mdnsd ${tag}" \
            --notes "mdnsd ${tag}" \
            ./*

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}